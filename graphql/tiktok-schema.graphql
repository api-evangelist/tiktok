  cursor: String!
}

type CommentReplyConnection {
  edges: [CommentReplyEdge!]!
  pageInfo: PageInfo!
}

type CommentReplyEdge {
  node: CommentReply!
  cursor: String!
}

type FollowerConnection {
  edges: [FollowerEdge!]!
  pageInfo: PageInfo!
  totalCount: Long
}

type FollowerEdge {
  node: Follower!
  cursor: String!
}

type FollowRelationConnection {
  edges: [FollowRelationEdge!]!
  pageInfo: PageInfo!
  totalCount: Long
}

type FollowRelationEdge {
  node: FollowRelation!
  cursor: String!
}

type CampaignConnection {
  edges: [CampaignEdge!]!
  pageInfo: PageInfo!
  totalCount: Long
}

type CampaignEdge {
  node: Campaign!
  cursor: String!
}

type AdGroupConnection {
  edges: [AdGroupEdge!]!
  pageInfo: PageInfo!
  totalCount: Long
}

type AdGroupEdge {
  node: AdGroup!
  cursor: String!
}

type TikTokAdConnection {
  edges: [TikTokAdEdge!]!
  pageInfo: PageInfo!
  totalCount: Long
}

type TikTokAdEdge {
  node: TikTokAd!
  cursor: String!
}

type CatalogProductConnection {
  edges: [CatalogProductEdge!]!
  pageInfo: PageInfo!
  totalCount: Long
}

type CatalogProductEdge {
  node: CatalogProduct!
  cursor: String!
}

type OrderConnection {
  edges: [OrderEdge!]!
  pageInfo: PageInfo!
  totalCount: Long
}

type OrderEdge {
  node: Order!
  cursor: String!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

# ---------------------------------------------------------------------------
# Root Types
# ---------------------------------------------------------------------------

type Query {
  """Retrieve the authenticated user's basic information."""
  me: User

  """Look up any TikTok user by their open ID."""
  user(openId: ID!): User

  """Search for TikTok users."""
  searchUsers(query: String!, first: Int, after: String): [TikTokUser!]

  """Retrieve a video by ID."""
  video(videoId: ID!): Video

  """List videos posted by a user."""
  userVideos(openId: ID!, first: Int, after: String): VideoConnection

  """Retrieve a music track by ID."""
  music(musicId: ID!): Music

  """Look up a hashtag by name."""
  hashtag(name: String!): HashTag

  """Look up a hashtag challenge."""
  hashtagChallenge(challengeId: ID!): HashTagChallenge

  """Retrieve comments for a video."""
  videoComments(videoId: ID!, first: Int, after: String): CommentConnection

  """Retrieve an active or past LIVE session."""
  live(liveId: ID!): LIVE

  """Retrieve a creator's marketplace profile."""
  creatorMarketplace(creatorId: ID!): CreatorMarketplace

  """Retrieve an ad account."""
  adAccount(adAccountId: ID!): AdAccount

  """List campaigns in an ad account."""
  campaigns(adAccountId: ID!, first: Int, after: String): CampaignConnection

  """Retrieve a specific campaign."""
  campaign(campaignId: ID!): Campaign

  """Retrieve a specific ad group."""
  adGroup(adGroupId: ID!): AdGroup

  """Retrieve a specific TikTok ad."""
  ad(adId: ID!): TikTokAd

  """List custom audiences for an ad account."""
  customAudiences(adAccountId: ID!, first: Int, after: String): [CustomAudience!]

  """Retrieve a TikTok Shop."""
  shop(shopId: ID!): TikTokShop

  """List products in a shop."""
  shopProducts(shopId: ID!, first: Int, after: String): CatalogProductConnection

  """Retrieve a shop order."""
  order(orderId: ID!): Order

  """List orders for a shop."""
  shopOrders(shopId: ID!, status: OrderStatus, first: Int, after: String): OrderConnection

  """Retrieve affiliate program information for a creator."""
  affiliate(affiliateId: ID!): Affiliate

  """Retrieve an OAuth app registration."""
  oauthApp(appId: ID!): OAuthApp

  """List webhooks for an app."""
  webhooks(appId: ID!): [Webhook!]

  """Retrieve a conversion pixel."""
  conversionPixel(pixelId: ID!): ConversionPixel
}

type Mutation {
  """Post a video using the TikTok Content Posting API."""
  createVideo(authorOpenId: ID!, caption: String, privacyLevel: String, disableDuet: Boolean, disableComment: Boolean, disableStitch: Boolean): Video

  """Delete a TikTok video."""
  deleteVideo(videoId: ID!): Boolean

  """Create a comment on a video."""
  createComment(videoId: ID!, text: String!): Comment

  """Delete a comment."""
  deleteComment(commentId: ID!): Boolean

  """Like a video."""
  likeVideo(videoId: ID!): Like

  """Unlike a video."""
  unlikeVideo(videoId: ID!): Boolean

  """Follow a TikTok user."""
  followUser(targetOpenId: ID!): FollowRelation

  """Unfollow a TikTok user."""
  unfollowUser(targetOpenId: ID!): Boolean

  """Create a new ad campaign."""
  createCampaign(adAccountId: ID!, name: String!, objective: CampaignObjective!, budget: Float!, budgetMode: String!): Campaign

  """Update an existing ad campaign."""
  updateCampaign(campaignId: ID!, name: String, status: AdStatus, budget: Float): Campaign

  """Create an ad group within a campaign."""
  createAdGroup(campaignId: ID!, name: String!, budget: Float!, bidAmount: Float, placements: [String!]): AdGroup

  """Create a TikTok ad."""
  createAd(adGroupId: ID!, name: String!, creativeType: String!, landingPageUrl: URL, callToAction: String): TikTokAd

  """Create a Spark Ad from an organic video."""
  createSparkAd(adGroupId: ID!, organicVideoId: ID!, boostType: String!): SparkAd

  """Create a custom audience."""
  createCustomAudience(adAccountId: ID!, name: String!, audienceType: String!): CustomAudience

  """Create a lookalike audience."""
  createLookAlike(adAccountId: ID!, sourceAudienceId: ID!, name: String!, country: String!, reachType: String!): LookAlike

  """Register a conversion pixel."""
  createConversionPixel(adAccountId: ID!, name: String!, websiteUrl: URL!): ConversionPixel

  """Register a webhook for an app."""
  createWebhook(appId: ID!, endpointUrl: URL!, events: [String!]!): Webhook

  """Delete a webhook."""
  deleteWebhook(webhookId: ID!): Boolean

  """Create an order in TikTok Shop."""
  createOrder(shopId: ID!, lineItems: [JSON!]!, shippingAddress: JSON!): Order

  """Update an order status."""
  updateOrderStatus(orderId: ID!, status: OrderStatus!): Order
}
