"""
TikTok GraphQL Schema
Conceptual GraphQL schema derived from TikTok REST APIs:
  - TikTok for Developers (https://developers.tiktok.com/)
  - TikTok API for Business (https://business-api.tiktok.com/portal/docs)
  - TikTok Shop API (https://partner.tiktokshop.com/)
  - TikTok Data Portability API (https://developers.tiktok.com/doc/data-portability-api-get-started)
"""

# ---------------------------------------------------------------------------
# Scalars
# ---------------------------------------------------------------------------

scalar DateTime
scalar JSON
scalar URL
scalar Long

# ---------------------------------------------------------------------------
# Enums
# ---------------------------------------------------------------------------

enum VideoStatus {
  PUBLIC
  PRIVATE
  FRIENDS_ONLY
  DRAFT
  DELETED
}

enum AdStatus {
  ENABLE
  DISABLE
  DELETE
  CAMPAIGN_DISABLE
}

enum CampaignObjective {
  AWARENESS
  REACH
  VIDEO_VIEWS
  APP_INSTALL
  WEBSITE_CONVERSIONS
  LEAD_GENERATION
  SHOP_PURCHASES
}

enum AudienceGender {
  MALE
  FEMALE
  ALL
}

enum OrderStatus {
  UNPAID
  AWAITING_SHIPMENT
  AWAITING_COLLECTION
  IN_TRANSIT
  DELIVERED
  COMPLETED
  CANCELLED
  IN_CANCEL
  PARTIALLY_RETURNING
  REVERSE_IN_PROGRESS
  COMPLETED_RETURN
}

enum LiveStatus {
  ACTIVE
  ENDED
  PAUSED
}

enum SharePlatform {
  TIKTOK
  INSTAGRAM
  FACEBOOK
  TWITTER
  WHATSAPP
  SMS
  COPY_LINK
}

enum CreatorTier {
  STANDARD
  RISING
  ESTABLISHED
  TOP
}

enum AffiliateTaskStatus {
  PENDING
  IN_PROGRESS
  COMPLETED
  CANCELLED
}

# ---------------------------------------------------------------------------
# User & Profile Types
# ---------------------------------------------------------------------------

"""A TikTok user account."""
type User {
  openId: ID!
  unionId: ID
  username: String!
  displayName: String!
  bio: String
  avatarUrl: URL
  avatarLargeUrl: URL
  profileDeepLink: URL
  isVerified: Boolean!
  isPrivateAccount: Boolean!
  createdAt: DateTime!
  stats: UserStats
  profile: UserProfile
  followers(first: Int, after: String): FollowerConnection
  following(first: Int, after: String): FollowRelationConnection
  videos(first: Int, after: String): VideoConnection
}

"""Extended public-facing profile information for a TikTok user."""
type UserProfile {
  userId: ID!
  nickname: String!
  signature: String
  region: String
  language: String
  commerceUserInfo: BusinessAccount
  creatorInfo: CreatorProfile
}

"""Aggregated statistics for a TikTok user account."""
type UserStats {
  userId: ID!
  followerCount: Long!
  followingCount: Long!
  likeCount: Long!
  videoCount: Long!
  heartCount: Long!
}

"""A follow relationship between two TikTok users."""
type FollowRelation {
  followerId: ID!
  followeeId: ID!
  followedAt: DateTime!
  follower: TikTokUser
  followee: TikTokUser
}

"""Simplified reference to a TikTok user used in relation objects."""
type TikTokUser {
  openId: ID!
  displayName: String!
  username: String!
  avatarUrl: URL
  isVerified: Boolean!
}

"""A follower entry linking a user to their follower."""
type Follower {
  userId: ID!
  followerUser: TikTokUser!
  followedAt: DateTime!
}

# ---------------------------------------------------------------------------
# Video Types
# ---------------------------------------------------------------------------

"""A TikTok video post."""
type Video {
  id: ID!
  createTime: DateTime!
  coverImageUrl: URL
  shareUrl: URL!
  embedUrl: URL
  title: String
  description: String
  duration: Int!
  height: Int
  width: Int
  status: VideoStatus!
  privacyLevel: String
  commentDisabled: Boolean!
  duetDisabled: Boolean!
  stitchDisabled: Boolean!
  author: TikTokUser
  stats: VideoStat
  details: VideoDetails
  captions: [VideoCaption!]
  sound: VideoSound
  effects: [VideoEffect!]
  filters: [VideoFilter!]
  hashtags: [HashTag!]
  comments(first: Int, after: String): CommentConnection
  likes: Long
  shares: Long
  saves: Long
}

"""Detailed technical and metadata for a TikTok video."""
type VideoDetails {
  videoId: ID!
  format: String
  bitrate: Int
  frameRate: Float
  encodingFormat: String
  downloadUrl: URL
  embeddable: Boolean!
  brandContentToggle: Boolean
  brandOrganicToggle: Boolean
}

"""Engagement statistics for a single video."""
type VideoStat {
  videoId: ID!
  playCount: Long!
  likeCount: Long!
  commentCount: Long!
  shareCount: Long!
  saveCount: Long!
  forwardCount: Long
  downloadCount: Long
}

"""A caption / subtitle entry for a TikTok video."""
type VideoCaption {
  videoId: ID!
  language: String!
  captionUrl: URL
  captionText: String
  startTime: Float
  endTime: Float
}

"""The sound track associated with a TikTok video."""
type VideoSound {
  soundId: ID!
  title: String!
  authorName: String
  coverUrl: URL
  playUrl: URL
  duration: Int
  isOriginal: Boolean!
  music: Music
}

"""A visual effect applied to a TikTok video."""
type VideoEffect {
  effectId: ID!
  name: String!
  iconUrl: URL
  category: String
}

"""A filter applied to a TikTok video."""
type VideoFilter {
  filterId: ID!
  name: String!
  iconUrl: URL
  intensity: Float
}

