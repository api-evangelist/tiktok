specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: TikTok
providerId: tiktok
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Social
  - Video
  - Login
  - Sharing
description: TikTok's developer-platform APIs (Login Kit, Share Kit, Content Posting, Display, Embed
  Videos, Webhooks) are made available to registered developers without a published price. Access to
  Research Tools, Commercial Content API, and Data Portability API is gated by approval and audience
  rather than invoice. There is no public consumer-facing price for the TikTok APIs.
sources:
  - https://developers.tiktok.com/products
  - https://developers.tiktok.com/doc/getting-started-create-an-app
notes: TikTok does not publish a per-call price. Plans below capture the access tiers gated by approval
  and audience, not by billing.
plans:
  - id: tiktok-developer
    name: Developer (Default)
    type: freemium
    description: Default access to Login Kit, Share Kit, Embed Videos, Content Posting API, Display API,
      and Webhooks for any registered TikTok developer.
    entries:
      - label: Default Access
        name: default_access
        type: flat
        metric: usage
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
    elements:
      - name: Login Kit
      - name: Share Kit
      - name: Embed Videos
      - name: Content Posting API
      - name: Display API
      - name: Webhooks
  - id: tiktok-research-tools
    name: Research Tools
    type: enterprise
    description: Restricted access to research-grade TikTok data; available only to approved researchers.
    entries:
      - label: Approved-Researcher Access
        name: approved_researcher_access
        type: flat
        metric: usage
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: 'approval-gated'
        userMultiplied: false
    elements:
      - name: Available only to approved researchers
  - id: tiktok-commercial-content
    name: Commercial Content API
    type: enterprise
    description: Restricted access for commercial-content use cases; gated by approval.
    entries:
      - label: Approval-Gated Access
        name: approval_gated_access
        type: flat
        metric: usage
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: 'approval-gated'
        userMultiplied: false
    elements:
      - name: Approval required
  - id: tiktok-data-portability
    name: Data Portability API
    type: enterprise
    description: Limited to TikTok users in the EEA and UK; gated by region eligibility.
    entries:
      - label: EEA / UK Access
        name: eea_uk_access
        type: flat
        metric: usage
        limit: -1
        timeFrame: usage
        geo: 'EEA, UK'
        unit: 1
        price: '0'
        userMultiplied: false
    elements:
      - name: EEA and UK users only
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
