naftiko: 1.0.0-alpha2
info:
  label: TikTok API for Business — Audiences
  description: 'TikTok API for Business — Audiences. 1 operations. Lead operation: List Custom Audiences. Self-contained Naftiko
    capability covering one Tiktok business surface.'
  tags:
  - Tiktok
  - Audiences
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TIKTOK_API_KEY: TIKTOK_API_KEY
capability:
  consumes:
  - type: http
    namespace: business-audiences
    baseUri: https://business-api.tiktok.com
    description: TikTok API for Business — Audiences business capability. Self-contained, no shared references.
    resources:
    - name: open_api-v1.3-dmp-custom_audience-list
      path: /open_api/v1.3/dmp/custom_audience/list/
      operations:
      - name: listcustomaudiences
        method: GET
        description: List Custom Audiences
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: advertiser_id
          in: query
          type: string
          required: true
        - name: page
          in: query
          type: integer
        - name: page_size
          in: query
          type: integer
    authentication:
      type: apikey
      key: Access-Token
      value: '{{env.TIKTOK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: business-audiences-rest
    port: 8080
    description: REST adapter for TikTok API for Business — Audiences. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/open-api/v1-3/dmp/custom-audience/list
      name: open-api-v1-3-dmp-custom-audience-list
      description: REST surface for open_api-v1.3-dmp-custom_audience-list.
      operations:
      - method: GET
        name: listcustomaudiences
        description: List Custom Audiences
        call: business-audiences.listcustomaudiences
        with:
          advertiser_id: rest.advertiser_id
          page: rest.page
          page_size: rest.page_size
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: business-audiences-mcp
    port: 9090
    transport: http
    description: MCP adapter for TikTok API for Business — Audiences. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-custom-audiences
      description: List Custom Audiences
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: business-audiences.listcustomaudiences
      with:
        advertiser_id: tools.advertiser_id
        page: tools.page
        page_size: tools.page_size
      outputParameters:
      - type: object
        mapping: $.
