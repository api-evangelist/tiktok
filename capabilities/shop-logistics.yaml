naftiko: 1.0.0-alpha2
info:
  label: TikTok Shop API — Logistics
  description: 'TikTok Shop API — Logistics. 1 operations. Lead operation: Get Shipping Document. Self-contained Naftiko capability
    covering one Tiktok business surface.'
  tags:
  - Tiktok
  - Logistics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TIKTOK_API_KEY: TIKTOK_API_KEY
capability:
  consumes:
  - type: http
    namespace: shop-logistics
    baseUri: https://open-api.tiktokglobalshop.com
    description: TikTok Shop API — Logistics business capability. Self-contained, no shared references.
    resources:
    - name: logistics-202309-orders-order_id-shipping_documents
      path: /logistics/202309/orders/{order_id}/shipping_documents
      operations:
      - name: getshippingdocument
        method: GET
        description: Get Shipping Document
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: order_id
          in: path
          type: string
          required: true
        - name: document_type
          in: query
          type: string
          required: true
    authentication:
      type: apikey
      key: x-tts-access-token
      value: '{{env.TIKTOK_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: shop-logistics-rest
    port: 8080
    description: REST adapter for TikTok Shop API — Logistics. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/logistics/202309/orders/{order-id}/shipping-documents
      name: logistics-202309-orders-order-id-shipping-documents
      description: REST surface for logistics-202309-orders-order_id-shipping_documents.
      operations:
      - method: GET
        name: getshippingdocument
        description: Get Shipping Document
        call: shop-logistics.getshippingdocument
        with:
          order_id: rest.order_id
          document_type: rest.document_type
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: shop-logistics-mcp
    port: 9090
    transport: http
    description: MCP adapter for TikTok Shop API — Logistics. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-shipping-document
      description: Get Shipping Document
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: shop-logistics.getshippingdocument
      with:
        order_id: tools.order_id
        document_type: tools.document_type
      outputParameters:
      - type: object
        mapping: $.
