naftiko: 1.0.0-alpha2
info:
  label: TikTok Shop Operations
  description: Workflow capability for TikTok Shop e-commerce operations. Uses the TikTok Shop API to manage product catalogs,
    fulfill orders, track logistics, and monitor financial settlements. Designed for sellers, marketplace integrators, and
    e-commerce platforms.
  tags:
  - TikTok
  - Commerce
  - E-Commerce
  - Products
  - Orders
  - Fulfillment
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    TIKTOK_SHOP_ACCESS_TOKEN: TIKTOK_SHOP_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: tiktok-shop
    baseUri: https://open-api.tiktokglobalshop.com
    description: TikTok Shop API for seller product and order management
    authentication:
      type: apikey
      key: x-tts-access-token
      value: '{{TIKTOK_SHOP_ACCESS_TOKEN}}'
      placement: header
    resources:
    - name: products
      path: /product/202309/products
      description: Product catalog management
      operations:
      - name: list-products
        method: GET
        description: Retrieve products from seller catalog
        inputParameters:
        - name: page_size
          in: query
          type: integer
          required: false
        - name: page_token
          in: query
          type: string
          required: false
        - name: status
          in: query
          type: string
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-product
        method: GET
        description: Get product details by ID
        inputParameters:
        - name: product_id
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: orders
      path: /order/202309/orders
      description: Order management
      operations:
      - name: list-orders
        method: GET
        description: List seller orders
        inputParameters:
        - name: page_size
          in: query
          type: integer
          required: false
        - name: order_status
          in: query
          type: string
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-order
        method: GET
        description: Get order details by ID
        inputParameters:
        - name: order_id
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: finance
      path: /finance/202309/payments
      description: Payment and settlement data
      operations:
      - name: list-payments
        method: GET
        description: List payment settlement records
        inputParameters:
        - name: page_size
          in: query
          type: integer
          required: false
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8081
    namespace: tiktok-shop-operations-api
    description: Unified REST API for TikTok Shop operations.
    resources:
    - path: /v1/products
      name: products
      description: Product catalog management
      operations:
      - method: GET
        name: list-products
        description: List products in the shop catalog
        call: tiktok-shop.list-products
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/products/{product_id}
      name: product-detail
      description: Individual product management
      operations:
      - method: GET
        name: get-product
        description: Get product details
        call: tiktok-shop.get-product
        with:
          product_id: rest.product_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders
      name: orders
      description: Order management
      operations:
      - method: GET
        name: list-orders
        description: List all shop orders
        call: tiktok-shop.list-orders
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{order_id}
      name: order-detail
      description: Individual order management
      operations:
      - method: GET
        name: get-order
        description: Get order details
        call: tiktok-shop.get-order
        with:
          order_id: rest.order_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/payments
      name: payments
      description: Financial settlement records
      operations:
      - method: GET
        name: list-payments
        description: List payment settlements
        call: tiktok-shop.list-payments
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9091
    namespace: tiktok-shop-operations-mcp
    transport: http
    description: MCP server for AI-assisted TikTok Shop operations.
    tools:
    - name: list-products
      description: List products in TikTok Shop catalog
      hints:
        readOnly: true
        idempotent: true
      call: tiktok-shop.list-products
      outputParameters:
      - type: object
        mapping: $.
    - name: get-product
      description: Get TikTok Shop product details
      hints:
        readOnly: true
        idempotent: true
      call: tiktok-shop.get-product
      with:
        product_id: tools.product_id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-orders
      description: List TikTok Shop orders with status filtering
      hints:
        readOnly: true
        idempotent: true
      call: tiktok-shop.list-orders
      outputParameters:
      - type: object
        mapping: $.
    - name: get-order
      description: Get detailed TikTok Shop order information
      hints:
        readOnly: true
        idempotent: true
      call: tiktok-shop.get-order
      with:
        order_id: tools.order_id
      outputParameters:
      - type: object
        mapping: $.
    - name: list-payments
      description: List TikTok Shop payment settlement records
      hints:
        readOnly: true
        idempotent: true
      call: tiktok-shop.list-payments
      outputParameters:
      - type: object
        mapping: $.
