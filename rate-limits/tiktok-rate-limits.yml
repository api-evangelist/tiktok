specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: TikTok
providerId: tiktok
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Social
  - Video
  - Rate Limiting
description: TikTok publishes default rate limits for v2 server APIs at 600 requests per one-minute sliding
  window per key endpoint (user info, video query, video list). Throttled requests return HTTP 429 with
  error code rate_limit_exceeded. Higher limits are granted on review via the Support Page.
sources:
  - https://developers.tiktok.com/doc/tiktok-api-v2-rate-limit
responseCodes:
  throttled: 429
limits:
  - name: /v2/user/info/
    scope: client
    metric: requests_per_minute
    limit: 600
    timeFrame: minute
    notes: One-minute sliding window.
  - name: /v2/video/query/
    scope: client
    metric: requests_per_minute
    limit: 600
    timeFrame: minute
    notes: One-minute sliding window.
  - name: /v2/video/list/
    scope: client
    metric: requests_per_minute
    limit: 600
    timeFrame: minute
    notes: One-minute sliding window.
policies:
  - name: Sliding Window
    description: Rate-limit calculation uses a one-minute sliding window per documented endpoint.
  - name: Quota Increase
    description: Applications needing higher limits submit a request via the TikTok developer Support
      Page; TikTok reviews and may approve a raised cap.
  - name: Throttling Response
    description: When the limit is exceeded the API returns HTTP 429 with error code rate_limit_exceeded;
      clients should back off before retrying.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
